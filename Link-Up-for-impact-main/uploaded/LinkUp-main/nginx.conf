# ============================================
# Configuração do Nginx para React SPA + FastAPI
# ============================================

# Definir cache de upstream para o backend
upstream backend {
    server 127.0.0.1:8000;
}

# Servidor principal na porta 80
server {
    listen 80;
    server_name _;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Tamanho máximo de upload
    client_max_body_size 10M;

    # Compressão gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/json application/javascript;

    # ============================================
    # Servir Frontend React (SPA)
    # ============================================
    
    location / {
        root /app/frontend/build;
        index index.html;
        
        # Tentar servir arquivo estático, senão retorna index.html
        # Isso permite que o React Router funcione corretamente
        try_files $uri $uri/ /index.html;
        
        # Headers de cache para arquivos estáticos
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Cache mais curto para index.html (sempre buscar versão atualizada)
    location = /index.html {
        root /app/frontend/build;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ============================================
    # Proxy Reverso para Backend (FastAPI)
    # ============================================
    
    location /api {
        # Proxy para o backend FastAPI
        proxy_pass http://backend;
        
        # Headers necessários para proxy
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Desabilitar cache para API
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ============================================
    # Health Check Endpoint
    # ============================================
    
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ============================================
    # Segurança e Headers
    # ============================================
    
    # Prevenir clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # XSS Protection
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Prevenir MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # Referrer Policy
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
}
